<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS - Announcements</title>
</head>
<body>
    <h1>📋 QMS - Announcements</h1>
    <p id="user-name">Loading...</p>
    <a href="../login.html" onclick="logout()">🚪 Logout</a>
    <hr>

    <nav>
        <a href="user_dashboard.html">🏠 Dashboard</a> |
        <a href="user_announcements.html">📢 Announcements</a> |
        <a href="user_documents.html">📄 My Documents</a> |
        <a href="user_templates.html">📝 Templates</a> |
        <a href="user_settings.html">⚙️ Settings</a>
    </nav>
    <hr>

    <div id="status"></div>

    <h2>📢 Announcements</h2>

    <!-- Filter -->
    <button onclick="filterAnn('All')">All</button>
    <button onclick="filterAnn('Task')">✅ With Task</button>
    <button onclick="filterAnn('General')">📢 General</button>
    <br><br>

    <span id="ann-count"></span>
    <br><br>

    <div id="announcements-list">🔄 Loading...</div>

    <script src="../js/api.js"></script>
    <script>
        let allAnnouncements = [];

        const currentUser = checkAuth();
        if (currentUser.roleId === 1) window.location.href = '../admin/admin_dashboard.html';
        document.getElementById('user-name').textContent = '👋 ' + currentUser.fullName;

        function showStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.innerHTML = msg;
            status.style.color = isError ? 'red' : 'green';
        }

        async function loadAnnouncements() {
            try {
                showStatus('🔄 Loading...');
                const announcements = await fetchData('Announcement');
                allAnnouncements = announcements;
                renderAnnouncements(allAnnouncements);
                showStatus(`✅ ${announcements.length} announcements loaded`);
            } catch(e) {
                showStatus('❌ ' + e.message, true);
            }
        }

        function renderAnnouncements(announcements) {
            document.getElementById('ann-count').textContent = `Total: ${announcements.length}`;
            const container = document.getElementById('announcements-list');

            if (!announcements.length) {
                container.innerHTML = '<p>No announcements yet.</p>';
                return;
            }

            container.innerHTML = announcements.map(a => {
                // ✅ CONDITIONAL RENDERING
                let taskSection = '';
                if (a.taskId !== null && a.task) {
                    const isOverdue = a.task.deadline && new Date(a.task.deadline) < new Date();
                    const deadlineText = a.task.deadline
                        ? `📅 Deadline: ${new Date(a.task.deadline).toLocaleString()}`
                        : '📅 No deadline';
                    const overdueWarning = isOverdue
                        ? `<span style="color:red;"> ⚠️ Overdue!</span>`
                        : '';

                    taskSection = `
                        <div style="background:#d4edda; padding:12px; border-radius:6px; margin-top:10px;">
                            <strong>✅ Task Required: ${a.task.title}</strong><br>
                            <small>${a.task.description || ''}</small><br>
                            <small>${deadlineText}${overdueWarning}</small><br>
                            <small>Status: <strong>${a.task.status}</strong></small><br><br>
                            <a href="user_upload.html?taskId=${a.taskId}" 
                               style="padding:8px 16px; background:#28a745; color:white; text-decoration:none; border-radius:5px; font-weight:bold;">
                               📤 Go to Task → Upload Document
                            </a>
                        </div>
                    `;
                } else {
                    taskSection = `
                        <div style="background:#d1ecf1; padding:8px; border-radius:6px; margin-top:10px;">
                            <small>📢 General Announcement — No action required</small>
                        </div>
                    `;
                }

                return `
                    <div style="border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:8px; ${a.taskId ? 'border-left:4px solid #28a745;' : 'border-left:4px solid #17a2b8;'}">
                        <h3>${a.taskId ? '✅' : '📢'} ${a.title}</h3>
                        <p>${a.content}</p>
                        ${taskSection}
                        <br>
                        <small style="color:gray;">Posted by ${a.createdBy} on ${new Date(a.createdAt).toLocaleDateString()}</small>
                    </div>
                `;
            }).join('');
        }

        function filterAnn(type) {
            let filtered = allAnnouncements;
            if (type === 'Task') filtered = allAnnouncements.filter(a => a.taskId !== null);
            if (type === 'General') filtered = allAnnouncements.filter(a => a.taskId === null);
            renderAnnouncements(filtered);
        }

        loadAnnouncements();
    </script>
</body>
</html>
