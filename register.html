<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QMS | Create Account</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="icon" type="image/png" href="images/tski.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Background elements -->
    <div class="bg-gradient"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <main class="register-container">
        <!-- Logo -->
        <img src="images/tski.jpg" alt="TSKI Logo" class="logo-image">
        
        <h1 class="register-title">Create Account</h1>
        <p class="register-subtitle">Join the Quality Management System</p>
        
        <div class="admin-notice">
            <i class="fas fa-shield-alt"></i>
            <span>Your account will be activated by the Administrator after review</span>
        </div>
        
        <form class="register-form" id="registerForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="fullname" placeholder="Enter your full name">
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="password" placeholder="Create a password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-building"></i> Department</label>
                <div class="input-wrapper">
                    <i class="fas fa-building input-icon"></i>
                    <select id="department">
                        <option value="">-- Select Department --</option>
                    </select>
                    <i class="fas fa-chevron-down select-arrow"></i>
                </div>
            </div>
            
            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>
            
            <button type="submit" class="btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i>
                <span>Register Account</span>
            </button>
        </form>
        
        <div class="login-link">
            Already have an account?
            <a href="login.html">Sign In <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="back-home">
            <a href="index.html">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
        
        // Password strength indicator
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;
                
                if (password.length >= 8) strength++;
                if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
                if (password.match(/\d/)) strength++;
                if (password.match(/[^a-zA-Z\d]/)) strength++;
                
                const percentage = (strength / 4) * 100;
                strengthBar.style.width = percentage + '%';
                
                if (strength === 0) {
                    strengthBar.style.background = '#6c757d';
                    strengthText.textContent = '';
                } else if (strength === 1) {
                    strengthBar.style.background = '#dc3545';
                    strengthText.textContent = 'Weak password';
                    strengthText.style.color = '#ff8b8b';
                } else if (strength === 2) {
                    strengthBar.style.background = '#ffc107';
                    strengthText.textContent = 'Fair password';
                    strengthText.style.color = '#ffd970';
                } else if (strength === 3) {
                    strengthBar.style.background = '#17a2b8';
                    strengthText.textContent = 'Good password';
                    strengthText.style.color = '#6b9fd6';
                } else {
                    strengthBar.style.background = '#28a745';
                    strengthText.textContent = 'Strong password';
                    strengthText.style.color = '#8bff8b';
                }
            });
        }
        
        // Form submission
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        
        if (registerForm) {
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                registerBtn.classList.add('loading');
                const originalContent = registerBtn.innerHTML;
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Creating Account...</span>';
                
                if (typeof register === 'function') {
                    register();
                }
                
                setTimeout(() => {
                    registerBtn.classList.remove('loading');
                    registerBtn.innerHTML = originalContent;
                }, 3000);
            });
        }
        
        // Clear messages on input
        const inputs = document.querySelectorAll('#fullname, #email, #password, #department');
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                const errorMsg = document.getElementById('error-msg');
                const successMsg = document.getElementById('success-msg');
                if (errorMsg) errorMsg.textContent = '';
                if (successMsg) successMsg.textContent = '';
            });
        });
    </script>
</body>
</html>
