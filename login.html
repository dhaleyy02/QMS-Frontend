<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QMS | Secure Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/png" href="images/tski.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
</head>
<body>
    <!-- Background elements -->
    <div class="bg-gradient"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <main class="login-container">
        <!-- Logo -->
        <img src="images/tski.jpg" alt="TSKI Logo" class="logo-image">
        
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to continue to your account</p>
        
        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <div id="error-msg" class="error-message"></div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i>
                <span>Sign In</span>
            </button>
        </form>
        
        <div class="register-link">
            Don't have an account?
            <a href="register.html">Create Account <i class="fas fa-arrow-right"></i></a>
        </div>
        
        <div class="back-home">
            <a href="index.html">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
        
        // Form submission
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                loginBtn.classList.add('loading');
                const originalContent = loginBtn.innerHTML;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Authenticating...</span>';
                
                if (typeof login === 'function') {
                    login();
                }
                
                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = originalContent;
                }, 3000);
            });
        }
        
        // Clear error on input
        const inputs = document.querySelectorAll('#email, #password');
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                const errorMsg = document.getElementById('error-msg');
                if (errorMsg) {
                    errorMsg.textContent = '';
                }
            });
        });
    </script>
</body>
</html>
