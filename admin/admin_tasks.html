<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS - Tasks</title>
</head>
<body>
    <h1>📋 QMS - Task Management</h1>
    <p id="admin-name">Loading...</p>
    <a href="../login.html" onclick="logout()">🚪 Logout</a>
    <hr>

    <nav>
        <a href="admin_dashboard.html">🏠 Dashboard</a> |
        <a href="admin_users.html">👥 Users</a> |
        <a href="admin_documents.html">📄 Documents</a> |
        <a href="admin_announcements.html">📢 Announcements</a> |
        <a href="admin_tasks.html">✅ Tasks</a> |
        <a href="admin_templates.html">📝 Templates</a> |
        <a href="admin_categories.html">📁 Categories</a> |
        <a href="admin_archive.html">🗃️ Archive</a> |
        <a href="admin_settings.html">⚙️ Settings</a>
    </nav>
    <hr>

    <div id="status"></div>

    <!-- ➕ Create Task -->
    <h2>➕ Create New Task</h2>
    <label>Task Title</label><br>
    <input type="text" id="task-title" placeholder="Enter task title" style="width:300px;"><br><br>
    <label>Description</label><br>
    <textarea id="task-description" placeholder="Enter task description..." style="width:400px; height:80px;"></textarea><br><br>
    <label>Deadline (optional)</label><br>
    <input type="datetime-local" id="task-deadline" style="width:300px;"><br><br>
    <button onclick="createTask()">✅ Create Task</button>
    <button onclick="clearTaskForm()">🔄 Clear</button>
    <hr>

    <!-- Filter -->
    <button onclick="filterTasks('All')">All</button>
    <button onclick="filterTasks('Open')">🟢 Open</button>
    <button onclick="filterTasks('Closed')">🔴 Closed</button>
    <br><br>

    <!-- Tasks Table -->
    <h2>✅ All Tasks <span id="task-count"></span></h2>
    <table border="1" cellpadding="8" style="width:100%;">
        <tr>
            <th>#</th>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
        <tbody id="tasks-table">
            <tr><td colspan="7">🔄 Loading...</td></tr>
        </tbody>
    </table>

    <!-- Edit Form -->
    <div id="edit-form" style="display:none; padding:20px; border:1px solid #ccc; margin:20px 0;">
        <h3>✏️ Edit Task</h3>
        <input type="hidden" id="edit-id">
        <label>Title</label><br>
        <input type="text" id="edit-title" style="width:300px;"><br><br>
        <label>Description</label><br>
        <textarea id="edit-description" style="width:400px; height:80px;"></textarea><br><br>
        <label>Deadline</label><br>
        <input type="datetime-local" id="edit-deadline" style="width:300px;"><br><br>
        <label>Status</label><br>
        <select id="edit-status" style="width:310px;">
            <option value="Open">🟢 Open</option>
            <option value="Closed">🔴 Closed</option>
        </select><br><br>
        <button onclick="saveEdit()">💾 Save</button>
        <button onclick="closeEdit()">Cancel</button>
    </div>

    <script src="../js/api.js"></script>
    <script>
        let allTasks = [];

        const admin = checkAuth();
        if (admin.roleId !== 1) window.location.href = '../login.html';
        document.getElementById('admin-name').textContent = '👑 ' + admin.fullName;

        function showStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.innerHTML = msg;
            status.style.color = isError ? 'red' : 'green';
        }

        async function loadTasks() {
            try {
                showStatus('🔄 Loading...');
                const tasks = await fetchData('Task');
                allTasks = tasks;
                renderTasks(allTasks);
                showStatus(`✅ ${tasks.length} tasks loaded`);
            } catch(e) {
                showStatus('❌ ' + e.message, true);
            }
        }

        function renderTasks(tasks) {
            document.getElementById('task-count').textContent = `(${tasks.length})`;
            const tbody = document.getElementById('tasks-table');

            if (!tasks.length) {
                tbody.innerHTML = '<tr><td colspan="7">No tasks yet</td></tr>';
                return;
            }

            tbody.innerHTML = tasks.map((t, index) => {
                const deadline = t.deadline
                    ? new Date(t.deadline).toLocaleString()
                    : 'No deadline';
                const isOverdue = t.deadline && new Date(t.deadline) < new Date() && t.status === 'Open';
                const statusBadge = t.status === 'Open'
                    ? `<span style="color:green;">🟢 Open${isOverdue ? ' ⚠️ Overdue' : ''}</span>`
                    : `<span style="color:red;">🔴 Closed</span>`;

                return `
                    <tr style="${isOverdue ? 'background:#fff3cd;' : ''}">
                        <td>${index + 1}</td>
                        <td><strong>${t.title}</strong></td>
                        <td>${t.description || 'N/A'}</td>
                        <td>${deadline}</td>
                        <td>${statusBadge}</td>
                        <td>${new Date(t.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button onclick="openEdit(${t.id})">✏️ Edit</button>
                            <button onclick="toggleStatus(${t.id})">${t.status === 'Open' ? '🔴 Close' : '🟢 Reopen'}</button>
                            <button onclick="deleteTask(${t.id})">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTasks(status) {
            const filtered = status === 'All' ? allTasks : allTasks.filter(t => t.status === status);
            renderTasks(filtered);
        }

        // ── CREATE ──
        async function createTask() {
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-description').value.trim();
            const deadline = document.getElementById('task-deadline').value;

            if (!title) {
                showStatus('❌ Please enter a task title!', true);
                return;
            }

            try {
                await postData('Task', {
                    title,
                    description,
                    deadline: deadline ? new Date(deadline).toISOString() : null,
                    status: 'Open',
                    createdAt: new Date().toISOString()
                });
                clearTaskForm();
                showStatus('✅ Task created!');
                loadTasks();
            } catch(e) {
                showStatus('❌ Failed: ' + e.message, true);
            }
        }

        function clearTaskForm() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-deadline').value = '';
        }

        // ── EDIT ──
        function openEdit(id) {
            const t = allTasks.find(x => x.id === id);
            document.getElementById('edit-id').value = t.id;
            document.getElementById('edit-title').value = t.title;
            document.getElementById('edit-description').value = t.description || '';
            document.getElementById('edit-deadline').value = t.deadline
                ? new Date(t.deadline).toISOString().slice(0, 16)
                : '';
            document.getElementById('edit-status').value = t.status;
            document.getElementById('edit-form').style.display = 'block';
            window.scrollTo(0, document.getElementById('edit-form').offsetTop);
        }

        function closeEdit() {
            document.getElementById('edit-form').style.display = 'none';
        }

        async function saveEdit() {
            const id = parseInt(document.getElementById('edit-id').value);
            const title = document.getElementById('edit-title').value.trim();
            const description = document.getElementById('edit-description').value.trim();
            const deadline = document.getElementById('edit-deadline').value;
            const status = document.getElementById('edit-status').value;

            if (!title) {
                showStatus('❌ Please enter a task title!', true);
                return;
            }

            try {
                await putData(`Task/${id}`, {
                    id, title, description,
                    deadline: deadline ? new Date(deadline).toISOString() : null,
                    status
                });
                showStatus('✅ Task updated!');
                closeEdit();
                loadTasks();
            } catch(e) {
                showStatus('❌ Update failed', true);
            }
        }

        // ── TOGGLE STATUS ──
        async function toggleStatus(id) {
            const t = allTasks.find(x => x.id === id);
            const newStatus = t.status === 'Open' ? 'Closed' : 'Open';
            if (!confirm(`Set task to ${newStatus}?`)) return;
            try {
                await putData(`Task/${id}`, { ...t, status: newStatus });
                showStatus(`✅ Task ${newStatus}!`);
                loadTasks();
            } catch(e) {
                showStatus('❌ Update failed', true);
            }
        }

        // ── DELETE ──
        async function deleteTask(id) {
            if (!confirm('Delete this task? Linked announcements will remain but task link will be removed.')) return;
            try {
                await deleteData(`Task/${id}`);
                showStatus('🗑️ Task deleted!');
                loadTasks();
            } catch(e) {
                showStatus('❌ Delete failed', true);
            }
        }

        loadTasks();
    </script>
</body>
</html>
